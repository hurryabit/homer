[language-server.homer-server]
command = "homer"
args = ["server"]

[[language]]
name = "homer"
scope = "source.homer"
file-types = ["doh"]
language-servers = ["homer-server"]
comment-token = "//"
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "rust"
[language.formatter]
command = "rustfmt"
args = [
    "--edition",
    "2024",
    "--config",
    "group_imports=StdExternalCrate,imports_granularity=Item",
]
